# Render blueprint for the BrandForge web service (free tier).
# Deploy: push this repo to GitHub, then New + > Blueprint and point it here.
# All secrets are set in the Render dashboard (sync: false) — never committed.
#
# Note: the free plan sleeps after inactivity, so the first request after idle
# incurs a cold start (~30-60s) while the container spins up. /healthz is kept
# free of B2 calls so the health probe itself stays fast.
services:
  - type: web
    name: brandforge
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: false
    envVars:
      # --- Backblaze B2 (required) ---
      - key: B2_KEY_ID
        sync: false
      - key: B2_APP_KEY
        sync: false
      - key: B2_BUCKET
        sync: false
      - key: B2_REGION
        sync: false
      # --- Generative provider (OpenAI image fallback; primary today) ---
      - key: OPENAI_API_KEY
        sync: false
      # --- HTTP Basic auth for the gallery + API (both required to open routes) ---
      - key: BRANDFORGE_USER
        sync: false
      - key: BRANDFORGE_PASS
        sync: false
      # --- Optional public delivery base (leave unset for presigned URLs) ---
      - key: BRANDFORGE_PUBLIC_BASE_URL
        sync: false
